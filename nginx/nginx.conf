worker_processes auto;

events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream puppeteer_pool {
    least_conn;

    server puppeteer-1:3005 max_fails=3 fail_timeout=10s;
    server puppeteer-2:3005 max_fails=3 fail_timeout=10s;
    server puppeteer-3:3005 max_fails=3 fail_timeout=10s;
    server puppeteer-4:3005 max_fails=3 fail_timeout=10s;
    server puppeteer-5:3005 max_fails=3 fail_timeout=10s;
    server puppeteer-6:3005 max_fails=3 fail_timeout=10s;
    server puppeteer-7:3005 max_fails=3 fail_timeout=10s;
  }

  server {
    listen 80;

    client_max_body_size 150m;

    location /health {
      proxy_pass http://puppeteer_pool/health;
      proxy_connect_timeout 5s;
      proxy_read_timeout 10s;
      proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    }

    location /version {
      proxy_pass http://puppeteer_pool/version;
      proxy_connect_timeout 5s;
      proxy_read_timeout 10s;
      proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    }

    location /render {
      proxy_pass http://puppeteer_pool/render;

      proxy_connect_timeout 10s;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;

      proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
      proxy_next_upstream_tries 3;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}